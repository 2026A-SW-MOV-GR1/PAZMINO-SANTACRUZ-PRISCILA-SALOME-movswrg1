<!DOCTYPE html>
<html>
<body id="body">

<h1 id="texto"></h1>

<script>
    function actualizarUI(mensaje, colorTexto, colorFondo) {
        document.getElementById("texto").innerText = mensaje;
        document.getElementById("texto").style.color = colorTexto;
        document.getElementById("body").style.backgroundColor = colorFondo;
    }
</script>

</body>
</html>
